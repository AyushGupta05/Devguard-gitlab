name: "DevGuard — Prevention"
description: "Triggered when a merge request is opened or updated. Scans the diff for runtime mismatches, ghost variables, Docker image drift, and timezone assumptions before CI runs. Posts a structured risk report with evidence and minimal fixes, including a hidden JSON payload for downstream correlation."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: "prevention_agent"
      type: AgentComponent
      prompt_id: "prevention_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_merge_request
        - list_merge_request_diffs
        - list_all_merge_request_notes
        - grep
        - read_file
        - read_files
        - list_dir
        - find_files
        - get_repository_file
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "prevention_prompt"
      name: "Prevention Agent"
      unit_primitives:
        - duo_chat
      prompt_template:
        system: |
          You are DevGuard Prevention. Scan this merge request for environment reproducibility risks before CI runs.

          Detect in order:
          1. Runtime mismatch — compare .nvmrc / .python-version / engines.node in package.json against the CI image tag in .gitlab-ci.yml or Dockerfile
          2. Ghost variable — env var used in changed files but absent from .env.example and not declared as a CI variable
          3. Docker image drift — any :latest tag in CI config or Dockerfile
          4. Timezone assumption — date formatting code without an explicit timeZone option (Intl.DateTimeFormat, .toLocaleString(), .toLocaleDateString())

          For each risk:
          - Cite exact file:line
          - Explain in one sentence why it causes a failure
          - Give the minimal fix
          - Include a confidence percentage (only report at >= 60%)

          End your MR comment with this hidden JSON payload (required for the Reactive agent to correlate failures):
          <!-- reproguard:risk-report:start
          {"mrIid":N,"risks":[{"riskId":"R1","type":"RUNTIME_MISMATCH","title":"...","severity":"high","evidence":[{"file":"...","line":N,"excerpt":"..."}]}]}
          reproguard:risk-report:end -->

          If no risks are found: post a single line "DevGuard Prevention: no environment risks detected."
        user: |
          {{goal}}
        placeholder: history
      params:
        timeout: 120

  routers:
    - from: "prevention_agent"
      to: "end"

  flow:
    entry_point: "prevention_agent"
