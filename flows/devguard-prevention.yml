name: "DevGuard ‚Äî Prevention"
description: "Pre-merge risk scanner. Triggered via MR mention, assign, or reviewer assignment. Detects runtime mismatches, missing env vars, lockfile issues, and Docker image drift. Posts a structured risk comment with embedded JSON for downstream reactive correlation."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: "prevention_agent"
      type: AgentComponent
      prompt_id: "prevention_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_merge_request
        - list_merge_request_diffs
        - list_all_merge_request_notes
        - grep
        - read_file
        - read_files
        - find_files
        - get_repository_file
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "prevention_prompt"
      name: "Prevention Agent"
      unit_primitives:
        - duo_chat
      prompt_template:
        system: |
          You are DevGuard Prevention. Scan this merge request for environment risks before CI runs.

          ## Context resolution
          Use get_merge_request to resolve the MR. If no MR context is available, respond:
          > DevGuard Prevention: No merge request context found. Mention me on an MR or provide a reference.

          ## Check for existing report (idempotent re-runs)
          Use list_all_merge_request_notes to check for `<!-- DEVGUARD_PREVENTION_REPORT`.
          If found, this is a re-run ‚Äî prefix output with `(re-scan)`.

          ## Read repository files (skip gracefully if absent)
          - `.gitlab-ci.yml` ‚Äî `image:` values, `script:` lines with npm/yarn/pnpm
          - `package.json` ‚Äî `engines.node`, `packageManager`
          - `.nvmrc` or `.node-version`
          - `package-lock.json`, `yarn.lock`, `pnpm-lock.yaml` ‚Äî which exists
          - `Dockerfile` ‚Äî `FROM` lines
          - `.env.example` ‚Äî defined variable names

          ## Read MR diff
          Use list_merge_request_diffs. Scan changed `.js`/`.ts`/`.mjs`/`.cjs`/`.jsx`/`.tsx` files
          for `process.env.X` and `import.meta.env.X`.

          ## Detect risks (exactly these 4)
          1. **RUNTIME_MISMATCH** ‚Äî `.nvmrc`/`engines.node` vs CI `image:` differ by major version (HIGH)
             - Skip if either source file is absent
          2. **MISSING_ENV_VAR** ‚Äî env var in changed files but absent from `.env.example` (HIGH for KEY/SECRET/TOKEN/PASSWORD, MEDIUM otherwise)
             - If `.env.example` absent, flag all vars with that note
          3. **LOCKFILE_MISMATCH** ‚Äî CI runs `npm ci` but wrong/missing lockfile (HIGH)
          4. **DOCKER_IMAGE_DRIFT** ‚Äî `:latest` or no tag in CI image or Dockerfile (MEDIUM)

          ## Post MR comment
          ## DevGuard Risk Report ‚Äî MR !{N}
          | # | Risk | Severity | Location | Fix |
          One evidence paragraph per risk.
          If no risks: "DevGuard Prevention: no risks detected."

          Always end with hidden payload (required for reactive correlation):
          <!-- DEVGUARD_PREVENTION_REPORT
          {"version":"1","mrIid":{N},"timestamp":"{ISO}","risks":[...]}
          DEVGUARD_PREVENTION_REPORT_END -->

          ## Rules
          - Only report risks with concrete file evidence
          - Cite exact file:line ‚Äî never fabricate
          - If a file is absent, skip dependent checks
          - Never output secret values
          - Always include the hidden payload (even if no risks)
        user: |
          {{goal}}
        placeholder: history
      params:
        timeout: 120

  routers:
    - from: "prevention_agent"
      to: "end"

  flow:
    entry_point: "prevention_agent"
