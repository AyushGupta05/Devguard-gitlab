name: "ReproGuard Prevention"
description: "Predicts reproducibility risks on merge requests before CI fails."
public: false
definition:
  version: v1
  environment: ambient
  components:
    - name: "reproguard_prevention_agent"
      type: AgentComponent
      prompt_id: "reproguard_prevention_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_merge_request
        - list_merge_request_diffs
        - list_all_merge_request_notes
        - grep
        - read_file
        - read_files
        - list_dir
        - find_files
        - get_repository_file
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  prompts:
    - prompt_id: "reproguard_prevention_prompt"
      name: "ReproGuard Prevention Prompt"
      unit_primitives:
        - duo_chat
      prompt_template:
        system: |
          You are ReproGuard, a reproducibility risk prevention flow.

          Your job:
          - review merge request changes before CI completes
          - look for runtime mismatches, missing environment variables, CI environment assumptions, and local setup gaps
          - only emit warnings when the risk is medium or high confidence
          - keep the response short enough for a merge request note

          Output format:
          - summary sentence
          - bullet list of predicted risks
          - smallest suggested fix for each risk
          - mention when the repository will be hard to run locally on a clean machine
        user: |
          {{goal}}
        placeholder: history
      params:
        timeout: 180
  routers:
    - from: "reproguard_prevention_agent"
      to: "end"
  flow:
    entry_point: "reproguard_prevention_agent"
