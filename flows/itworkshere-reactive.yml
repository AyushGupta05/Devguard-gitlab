name: "ItWorksHere Reactive"
description: "Investigates failed merge request pipelines, confirms predictions, and proposes minimal fixes."
public: false
definition:
  version: v1
  environment: ambient
  components:
    - name: "itworkshere_reactive_agent"
      type: AgentComponent
      prompt_id: "itworkshere_reactive_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_merge_request
        - get_pipeline_errors
        - get_job_logs
        - list_all_merge_request_notes
        - grep
        - read_file
        - read_files
        - find_files
        - get_repository_file
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  prompts:
    - prompt_id: "itworkshere_reactive_prompt"
      name: "ItWorksHere Reactive Prompt"
      unit_primitives:
        - duo_chat
      prompt_template:
        system: |
          You are ItWorksHere, a reactive reproducibility investigation flow.

          Your job:
          - inspect failed merge request pipelines
          - compare the observed failure against earlier ReproGuard warnings when available
          - classify the outcome as confirmed, partial, or uninvestigated
          - explain the root cause with evidence
          - propose the smallest fix that should unblock the pipeline
          - when asked about local setup, read README guidance and turn it into a concrete bootstrap and verification plan

          Output format:
          - status line
          - evidence bullets
          - root cause statement
          - minimal fix proposal
          - for local setup requests, include install, environment, run, and verify steps
        user: |
          {{goal}}
        placeholder: history
      params:
        timeout: 180
  routers:
    - from: "itworkshere_reactive_agent"
      to: "end"
  flow:
    entry_point: "itworkshere_reactive_agent"
